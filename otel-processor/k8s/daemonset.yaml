# Custom OTel Collector DaemonSet with fingerprint processor.
# Replaces (or runs alongside) the default splunk-otel-collector agent DaemonSet.
#
# Image must be built and pushed first:
#   docker build -t <your-registry>/otelcol-fingerprint:latest otel-processor/
#   docker push <your-registry>/otelcol-fingerprint:latest
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otelcol-fingerprint
  namespace: default
  labels:
    app: otelcol-fingerprint
spec:
  selector:
    matchLabels:
      app: otelcol-fingerprint
  template:
    metadata:
      labels:
        app: otelcol-fingerprint
    spec:
      serviceAccountName: otelcol-fingerprint
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      # Copy baseline files from the ConfigMap into the writable emptyDir volume
      # before the collector starts. The sidecar keeps the ConfigMap (and therefore
      # this volume on the next pod restart) in sync after each auto-promotion.
      initContainers:
        - name: baseline-init
          image: busybox:1.36
          command: ["sh", "-c", "cp /baseline-cm/* /baseline/"]
          volumeMounts:
            - name: baseline-cm
              mountPath: /baseline-cm
              readOnly: true
            - name: baseline
              mountPath: /baseline
      containers:
        - name: otelcol
          image: localhost:9999/otelcol-fingerprint:latest
          imagePullPolicy: Always
          args:
            - --config=/etc/otelcol/config.yaml
          env:
            - name: WORKSHOP_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: workshop-secret
                  key: env
            - name: SPLUNK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-otel-collector
                  key: splunk_observability_access_token
            - name: SPLUNK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-api-token
                  key: token
            - name: SPLUNK_INGEST_URL
              value: "https://ingest.us1.signalfx.com"
            - name: SPLUNK_API_URL
              value: "https://api.us1.signalfx.com"
          ports:
            - containerPort: 4317   # OTLP gRPC
            - containerPort: 4318   # OTLP HTTP
            - containerPort: 13133  # health_check
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            limits:
              memory: 512Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 50m
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
            - name: baseline
              mountPath: /baseline   # writable emptyDir — auto-promotion writes here

        # Sidecar: watches Splunk for trace.fingerprint.promoted events and patches
        # the behavioral-baseline ConfigMap so all pods get the updated baseline
        # on their next baseline_reload_interval tick.
        - name: baseline-sync
          image: python:3.11-alpine
          command: ["python3", "/scripts/baseline-sync-sidecar.py"]
          env:
            - name: WORKSHOP_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: workshop-secret
                  key: env
            - name: SPLUNK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: splunk-api-token
                  key: token
            - name: SPLUNK_REALM
              value: "us1"
            - name: POLL_INTERVAL
              value: "30"
            - name: LOOKBACK_SECONDS
              value: "120"
          resources:
            limits:
              memory: 64Mi
              cpu: 50m
            requests:
              memory: 32Mi
              cpu: 10m
          volumeMounts:
            - name: baseline
              mountPath: /baseline   # reads promoted baseline files written by collector
            - name: sync-scripts
              mountPath: /scripts

      volumes:
        - name: config
          configMap:
            name: otelcol-fingerprint-config
        - name: baseline-cm
          configMap:
            name: behavioral-baseline   # source of truth — updated by sidecar after promotion
        - name: baseline
          emptyDir: {}               # writable copy — init container seeds it from baseline-cm
        - name: sync-scripts
          configMap:
            name: baseline-sync-scripts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-fingerprint-config
  namespace: default
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 80

      batch:
        send_batch_size: 1000
        timeout: 5s

      resource/add_environment:
        attributes:
          - action: insert
            key: deployment.environment
            value: ${env:WORKSHOP_ENVIRONMENT}

      fingerprintprocessor:
        trace_buffer_timeout: 10s
        baseline_path: /baseline/baseline.json
        error_baseline_path: /baseline/error_baseline.json
        environment: ${env:WORKSHOP_ENVIRONMENT}
        splunk_ingest_url: ${env:SPLUNK_INGEST_URL}
        splunk_access_token: ${env:SPLUNK_ACCESS_TOKEN}
        splunk_api_token: ${env:SPLUNK_API_TOKEN}
        min_spans: 2
        min_baseline_occurrences: 2
        baseline_reload_interval: 60s
        partial_trace_threshold: 0.7
        # Auto-promote new fingerprints after 10 detections. The promoted
        # baseline is written back to /baseline (emptyDir) and the
        # baseline-sync sidecar patches the ConfigMap so all pods reload it.
        promotion_threshold: 10
        promotion_writeback: true

    exporters:
      otlphttp/splunk:
        traces_endpoint: ${env:SPLUNK_INGEST_URL}/v2/trace/otlp
        headers:
          x-sf-token: ${env:SPLUNK_ACCESS_TOKEN}

      signalfx:
        access_token: ${env:SPLUNK_ACCESS_TOKEN}
        api_url: ${env:SPLUNK_API_URL}
        ingest_url: ${env:SPLUNK_INGEST_URL}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource/add_environment, fingerprintprocessor, batch]
          exporters: [otlphttp/splunk]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource/add_environment, batch]
          exporters: [signalfx]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-fingerprint
  namespace: default
---
# Role: allow the baseline-sync sidecar to patch the behavioral-baseline ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otelcol-fingerprint-baseline-sync
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["behavioral-baseline"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otelcol-fingerprint-baseline-sync
  namespace: default
subjects:
  - kind: ServiceAccount
    name: otelcol-fingerprint
    namespace: default
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: otelcol-fingerprint-baseline-sync
---
# NOTE: The baseline-sync-scripts ConfigMap is created by deploy.sh, not here,
# because kubectl --from-file handles the script embedding correctly:
#   kubectl create configmap baseline-sync-scripts \
#     --from-file=baseline-sync-sidecar.py=k8s/baseline-sync-sidecar.py \
#     --dry-run=client -o yaml | kubectl apply -f -
---
# Service so app pods can reach this collector at otelcol-fingerprint:4317/4318
apiVersion: v1
kind: Service
metadata:
  name: otelcol-fingerprint
  namespace: default
spec:
  selector:
    app: otelcol-fingerprint
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
